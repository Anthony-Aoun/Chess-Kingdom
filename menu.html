<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <head>
        <meta charset="utf-8">
        <title>ChessKingdom</title>
        <link href="css/menu_style.css" rel="stylesheet">
        <script type="text/javascript"> if (!window.console) console = {log: function() {}}; </script>
    </head>

    <body>
        <header>
            
            <!--create a Modal for the user-->
            <div class="w3-container">
                
                <!--settings button that appears when START is clicked-->
                <div  id="user" class="topnav" style="display:none">
                    <button class="user" onclick="getElementById('id01').style.display='block'"><i class="fa fa-fw fa-user"></i></button>
                </div>
              
                <div id="id01" class="w3-modal">
                  <div class="w3-modal-content w3-card-4 w3-animate-zoom" style="max-width:600px">
              
                    <div class="w3-center"><br>
                      <span onclick="document.getElementById('id01').style.display='none'" class="w3-button w3-xlarge w3-hover-red w3-display-topright" title="Close Modal">&times;</span>
                      <img src="src/avatar.jpg" alt="Avatar" style="width:30%" class="w3-circle w3-margin-top">
                    </div>
              
                    <form class="w3-container" action="/action_page.php">
                      <div class="w3-section">
                        <label class="w3-left"><b>Username</b></label>
                        <input class="w3-input w3-border w3-margin-bottom" type="text" placeholder="Enter Username" name="usrname" required>
                        <label class="w3-left"><b>Password</b></label>
                        <input class="w3-input w3-border" type="password" placeholder="Enter Password" name="psw" required>
                        <button class="w3-button w3-block w3-green w3-section w3-padding" type="submit">Login</button>
                        <input class="w3-left w3-check w3-padding" type="checkbox" checked="checked"> 
                        <span class="w3-left w3-padding w3-hide-small">Remember me</span>
                        <span class="w3-right w3-padding w3-hide-small"><a href="#"><b>SIGN UP</b></a></span>
                      </div>
                    </form>
              
                    <div class="w3-container w3-border-top w3-padding-16 w3-light-grey">
                        <span class="w3-left w3-padding w3-hide-small">&copy;2020 Anthony Aoun</span>
                        <span class="w3-right w3-padding w3-hide-small">Forgot <a href="#">password?</a></span>
                    </div>
              
                  </div>
                </div>
              </div>

            <!--Insert logo-title-->
            <img src="src/menu_logo.png" alt="logo" style="margin: 100px;">
        </header>

        <!--START button that disappers when clicked on-->
        <div id="disappears">
            <button class="disappears" onclick="Start()" style="vertical-align:middle"><span>START </span></button>
        </div>

        <!--music that plays when START is clicked-->
        <audio id="myAudio" loop>
            <source src="src/menu_music.mp3" type="audio/mpeg">
        </audio>

        <!--playing modes that appear when START is clicked-->
        <div id="appears" style="display:none">
            <button class="appears" onclick="window.location.href = 'VsComputer.html';">VS COMPUTER</button><br/>
            <button class="appears" onclick="window.location.href = 'multiplayer.html';">MULTIPLAYER</button><br/>
            <button class="appears" onclick="window.location.href = 'online.html';">ONLINE</button>
        </div>
  
        <script>
            var p = document.getElementById("myAudio")
            function Start() {
                p.play();
                document.getElementById("disappears").innerHTML = "<br />";
                document.getElementById("appears").style.display = "block";
                document.getElementById("user").style.display = "block";
             }
        </script>
        

        <script src="js/jquery-3.4.1.min.js"></script>
    </body>
</html>
